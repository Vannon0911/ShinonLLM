<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Release Flow</title>
  <desc id="desc">Prepare Validate Publish release flow diagram</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" rx="28"/>
  <text x="70" y="90" fill="#e2e8f0" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">GitHub Release Flow</text>
  <text x="70" y="130" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">ShinonLLM: from prep to publish in one controlled sequence</text>

  <rect x="70" y="190" width="300" height="340" rx="22" fill="#1d4ed8" opacity="0.9"/>
  <text x="100" y="250" fill="#dbeafe" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">1. Prepare</text>
  <text x="100" y="300" fill="#eff6ff" font-size="22" font-family="Segoe UI, Arial, sans-serif">SemVer decide</text>
  <text x="100" y="338" fill="#eff6ff" font-size="22" font-family="Segoe UI, Arial, sans-serif">Changelog update</text>
  <text x="100" y="376" fill="#eff6ff" font-size="22" font-family="Segoe UI, Arial, sans-serif">Local checks pass</text>

  <rect x="450" y="190" width="300" height="340" rx="22" fill="#0f766e" opacity="0.92"/>
  <text x="480" y="250" fill="#ccfbf1" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">2. Validate</text>
  <text x="480" y="300" fill="#f0fdfa" font-size="22" font-family="Segoe UI, Arial, sans-serif">Tag pushed</text>
  <text x="480" y="338" fill="#f0fdfa" font-size="22" font-family="Segoe UI, Arial, sans-serif">CI gates green</text>
  <text x="480" y="376" fill="#f0fdfa" font-size="22" font-family="Segoe UI, Arial, sans-serif">Artifacts verified</text>

  <rect x="830" y="190" width="300" height="340" rx="22" fill="#7c2d12" opacity="0.93"/>
  <text x="860" y="250" fill="#ffedd5" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">3. Publish</text>
  <text x="860" y="300" fill="#fff7ed" font-size="22" font-family="Segoe UI, Arial, sans-serif">Release notes</text>
  <text x="860" y="338" fill="#fff7ed" font-size="22" font-family="Segoe UI, Arial, sans-serif">Tag announcement</text>
  <text x="860" y="376" fill="#fff7ed" font-size="22" font-family="Segoe UI, Arial, sans-serif">Monitor and support</text>

  <line x1="380" y1="360" x2="440" y2="360" stroke="#38bdf8" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="760" y1="360" x2="820" y2="360" stroke="#38bdf8" stroke-width="8" marker-end="url(#arrow)"/>

  <rect x="70" y="575" width="1060" height="70" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="95" y="620" fill="#cbd5e1" font-size="24" font-family="Segoe UI, Arial, sans-serif">Rule: Never ship before green CI. If broken, patch fast and document impact.</text>
</svg>
