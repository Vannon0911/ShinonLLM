<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">ShinonLLM Consumer Value Map</title>
  <desc id="desc">Diagram with control, consistency, and trust as user outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="70" y="90" fill="#e2e8f0" font-size="42" font-family="Segoe UI, Arial" font-weight="700">Consumer Value Map</text>
  <text x="70" y="130" fill="#94a3b8" font-size="22" font-family="Segoe UI, Arial">Was Nutzer real bekommen: Kontrolle, Konsistenz, Verlässlichkeit</text>

  <rect x="70" y="180" width="320" height="420" rx="20" fill="#1d4ed8"/>
  <text x="100" y="240" fill="#eff6ff" font-size="30" font-family="Segoe UI, Arial" font-weight="700">Kontrolle</text>
  <text x="100" y="285" fill="#dbeafe" font-size="21" font-family="Segoe UI, Arial">- Lokaler Betrieb moeglich</text>
  <text x="100" y="320" fill="#dbeafe" font-size="21" font-family="Segoe UI, Arial">- Klarer API-Pfad</text>
  <text x="100" y="355" fill="#dbeafe" font-size="21" font-family="Segoe UI, Arial">- Vorhersagbares Verhalten</text>

  <rect x="440" y="180" width="320" height="420" rx="20" fill="#0f766e"/>
  <text x="470" y="240" fill="#ecfeff" font-size="30" font-family="Segoe UI, Arial" font-weight="700">Konsistenz</text>
  <text x="470" y="285" fill="#ccfbf1" font-size="21" font-family="Segoe UI, Arial">- Runtime zuerst, nicht Zufall</text>
  <text x="470" y="320" fill="#ccfbf1" font-size="21" font-family="Segoe UI, Arial">- Contract-Gates statt Guessing</text>
  <text x="470" y="355" fill="#ccfbf1" font-size="21" font-family="Segoe UI, Arial">- Reproduzierbare Flows</text>

  <rect x="810" y="180" width="320" height="420" rx="20" fill="#b45309"/>
  <text x="840" y="240" fill="#fffbeb" font-size="30" font-family="Segoe UI, Arial" font-weight="700">Verlaesslichkeit</text>
  <text x="840" y="285" fill="#fef3c7" font-size="21" font-family="Segoe UI, Arial">- Verify-Backend als Pflicht</text>
  <text x="840" y="320" fill="#fef3c7" font-size="21" font-family="Segoe UI, Arial">- Build-Checks fuer Frontend</text>
  <text x="840" y="355" fill="#fef3c7" font-size="21" font-family="Segoe UI, Arial">- Release-Playbook dokumentiert</text>
</svg>
