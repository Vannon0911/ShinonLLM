<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Release Tag Lifecycle</title>
  <desc id="desc">Tag creation and artifact creation visual</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" rx="28"/>
  <text x="70" y="90" fill="#f8fafc" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Tag to Release Artifacts</text>
  <text x="70" y="128" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">Annotated tag triggers immutable release pipeline</text>

  <rect x="90" y="190" width="280" height="320" rx="20" fill="#2563eb"/>
  <text x="120" y="250" fill="#eff6ff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Git</text>
  <text x="120" y="300" fill="#dbeafe" font-size="22" font-family="Consolas, monospace">git tag -a vX.Y.Z</text>
  <text x="120" y="340" fill="#dbeafe" font-size="22" font-family="Consolas, monospace">git push origin vX.Y.Z</text>

  <rect x="460" y="190" width="280" height="320" rx="20" fill="#0f766e"/>
  <text x="490" y="250" fill="#ecfeff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">GitHub Actions</text>
  <text x="490" y="300" fill="#ccfbf1" font-size="22" font-family="Segoe UI, Arial, sans-serif">CI workflow</text>
  <text x="490" y="338" fill="#ccfbf1" font-size="22" font-family="Segoe UI, Arial, sans-serif">Release workflow</text>
  <text x="490" y="376" fill="#ccfbf1" font-size="22" font-family="Segoe UI, Arial, sans-serif">Artifact checks</text>

  <rect x="830" y="190" width="280" height="320" rx="20" fill="#b45309"/>
  <text x="860" y="250" fill="#fffbeb" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">GitHub Release</text>
  <text x="860" y="300" fill="#fef3c7" font-size="22" font-family="Segoe UI, Arial, sans-serif">Release notes</text>
  <text x="860" y="338" fill="#fef3c7" font-size="22" font-family="Segoe UI, Arial, sans-serif">Assets + docs links</text>
  <text x="860" y="376" fill="#fef3c7" font-size="22" font-family="Segoe UI, Arial, sans-serif">Public version state</text>

  <path d="M380 350 C420 350,430 350,450 350" stroke="#38bdf8" stroke-width="8" fill="none"/>
  <polygon points="450,342 450,358 468,350" fill="#38bdf8"/>
  <path d="M750 350 C790 350,800 350,820 350" stroke="#38bdf8" stroke-width="8" fill="none"/>
  <polygon points="820,342 820,358 838,350" fill="#38bdf8"/>

  <rect x="90" y="560" width="1020" height="84" rx="14" fill="#0b1220" stroke="#475569"/>
  <text x="120" y="612" fill="#cbd5e1" font-size="24" font-family="Segoe UI, Arial, sans-serif">Gate: publish only if CI and release pipeline are both green.</text>
</svg>
