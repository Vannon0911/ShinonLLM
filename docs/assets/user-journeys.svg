<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">ShinonLLM User Journeys</title>
  <desc id="desc">Three practical usage paths: writing, support prep, and local QA.</desc>
  <rect width="1200" height="700" fill="#111827"/>
  <text x="70" y="90" fill="#f9fafb" font-size="42" font-family="Segoe UI, Arial" font-weight="700">Nutzbeispiele im Alltag</text>
  <text x="70" y="130" fill="#9ca3af" font-size="22" font-family="Segoe UI, Arial">Drei reale Flows statt Marketing-Sprech</text>

  <rect x="70" y="180" width="330" height="430" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="235" fill="#f3f4f6" font-size="28" font-family="Segoe UI, Arial" font-weight="700">1) Content Drafting</text>
  <text x="95" y="280" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">Input -> Kontext -> Antwort</text>
  <text x="95" y="315" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- konsistenter Stil</text>
  <text x="95" y="350" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- klare Struktur</text>
  <text x="95" y="385" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- weniger Nacharbeit</text>

  <rect x="435" y="180" width="330" height="430" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="460" y="235" fill="#f3f4f6" font-size="28" font-family="Segoe UI, Arial" font-weight="700">2) Support Vorlagen</text>
  <text x="460" y="280" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">Frage -> Runtime-Check -> Reply</text>
  <text x="460" y="315" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- weniger Halluzination</text>
  <text x="460" y="350" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- bessere Nachvollziehbarkeit</text>
  <text x="460" y="385" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- reproduzierbarer Prozess</text>

  <rect x="800" y="180" width="330" height="430" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="825" y="235" fill="#f3f4f6" font-size="28" font-family="Segoe UI, Arial" font-weight="700">3) Lokale Quick-QA</text>
  <text x="825" y="280" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">llama.cpp + GGUF lokal</text>
  <text x="825" y="315" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- kein Cloud-Zwang</text>
  <text x="825" y="350" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- schnelle Testschleifen</text>
  <text x="825" y="385" fill="#d1d5db" font-size="20" font-family="Segoe UI, Arial">- saubere Release-Basis</text>
</svg>
