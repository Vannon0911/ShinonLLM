<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Release Notes Layout</title>
  <desc id="desc">Structured release notes template with sections</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" rx="28"/>
  <text x="60" y="80" fill="#0f172a" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Release Notes Blueprint</text>
  <text x="60" y="118" fill="#334155" font-size="24" font-family="Segoe UI, Arial, sans-serif">Keep notes short, structured, and traceable</text>

  <rect x="60" y="160" width="1080" height="500" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="90" y="196" width="1020" height="62" rx="10" fill="#0ea5e9"/>
  <text x="120" y="236" fill="#f0f9ff" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Summary</text>

  <rect x="90" y="276" width="490" height="110" rx="10" fill="#dbeafe"/>
  <text x="120" y="320" fill="#1e3a8a" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Added</text>
  <rect x="620" y="276" width="490" height="110" rx="10" fill="#dcfce7"/>
  <text x="650" y="320" fill="#14532d" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Changed</text>

  <rect x="90" y="404" width="490" height="110" rx="10" fill="#fef3c7"/>
  <text x="120" y="448" fill="#78350f" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Fixed</text>
  <rect x="620" y="404" width="490" height="110" rx="10" fill="#fee2e2"/>
  <text x="650" y="448" fill="#7f1d1d" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Breaking</text>

  <rect x="90" y="534" width="1020" height="92" rx="10" fill="#111827"/>
  <text x="120" y="588" fill="#e5e7eb" font-size="24" font-family="Segoe UI, Arial, sans-serif">Link changelog, migration notes, and affected documentation pages.</text>
</svg>
