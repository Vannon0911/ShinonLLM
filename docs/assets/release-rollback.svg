<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Release Rollback Strategy</title>
  <desc id="desc">Decision tree for release incidents and rollback actions</desc>
  <rect width="1200" height="700" fill="#0b1020" rx="28"/>
  <text x="60" y="82" fill="#f8fafc" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Rollback Strategy</text>
  <text x="60" y="120" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">Prefer corrective patch release over destructive rollback</text>

  <rect x="70" y="180" width="320" height="120" rx="16" fill="#dc2626"/>
  <text x="100" y="238" fill="#fff1f2" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Incident after release?</text>

  <rect x="450" y="120" width="320" height="140" rx="16" fill="#0f766e"/>
  <text x="480" y="182" fill="#ecfeff" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">No</text>
  <text x="480" y="220" fill="#ccfbf1" font-size="22" font-family="Segoe UI, Arial, sans-serif">Monitor and close</text>

  <rect x="450" y="300" width="320" height="140" rx="16" fill="#b45309"/>
  <text x="480" y="362" fill="#fffbeb" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Yes</text>
  <text x="480" y="400" fill="#fef3c7" font-size="22" font-family="Segoe UI, Arial, sans-serif">Hotfix on main</text>

  <rect x="830" y="300" width="320" height="140" rx="16" fill="#2563eb"/>
  <text x="860" y="362" fill="#eff6ff" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Patch Release</text>
  <text x="860" y="400" fill="#dbeafe" font-size="22" font-family="Segoe UI, Arial, sans-serif">Tag vX.Y.(Z+1)</text>

  <rect x="830" y="490" width="320" height="140" rx="16" fill="#1f2937" stroke="#64748b"/>
  <text x="860" y="552" fill="#e2e8f0" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Document Impact</text>
  <text x="860" y="590" fill="#cbd5e1" font-size="22" font-family="Segoe UI, Arial, sans-serif">Link old -> new release</text>

  <line x1="390" y1="240" x2="440" y2="190" stroke="#5eead4" stroke-width="7"/>
  <polygon points="440,190 431,205 447,204" fill="#5eead4"/>

  <line x1="390" y1="250" x2="440" y2="360" stroke="#f59e0b" stroke-width="7"/>
  <polygon points="440,360 425,350 425,368" fill="#f59e0b"/>

  <line x1="770" y1="370" x2="820" y2="370" stroke="#60a5fa" stroke-width="7"/>
  <polygon points="820,362 820,378 836,370" fill="#60a5fa"/>

  <line x1="990" y1="440" x2="990" y2="480" stroke="#94a3b8" stroke-width="7"/>
  <polygon points="982,480 998,480 990,494" fill="#94a3b8"/>
</svg>
