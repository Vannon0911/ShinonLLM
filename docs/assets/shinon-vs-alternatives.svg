<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">ShinonLLM vs Alternatives</title>
  <desc id="desc">Comparison chart between ShinonLLM, chat wrappers, and generic agent stacks.</desc>
  <rect width="1200" height="700" fill="#0b1020"/>
  <text x="70" y="90" fill="#f8fafc" font-size="40" font-family="Segoe UI, Arial" font-weight="700">Was ShinonLLM besser macht</text>
  <text x="70" y="130" fill="#94a3b8" font-size="21" font-family="Segoe UI, Arial">Nicht alles. Aber die kritischen Runtime-Teile.</text>

  <rect x="70" y="180" width="1060" height="450" rx="16" fill="#111827" stroke="#334155"/>
  <text x="110" y="230" fill="#cbd5e1" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Kriterium</text>
  <text x="430" y="230" fill="#93c5fd" font-size="22" font-family="Segoe UI, Arial" font-weight="700">ShinonLLM</text>
  <text x="700" y="230" fill="#cbd5e1" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Chat-Wrapper</text>
  <text x="930" y="230" fill="#cbd5e1" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Agent-Stacks</text>

  <line x1="90" y1="255" x2="1110" y2="255" stroke="#334155"/>

  <text x="110" y="300" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial">Entscheidungslogik</text>
  <text x="430" y="300" fill="#bbf7d0" font-size="20" font-family="Segoe UI, Arial">Runtime-first</text>
  <text x="700" y="300" fill="#fecaca" font-size="20" font-family="Segoe UI, Arial">oft model-first</text>
  <text x="930" y="300" fill="#fde68a" font-size="20" font-family="Segoe UI, Arial">tool-first</text>

  <text x="110" y="360" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial">Memory-Kontrolle</text>
  <text x="430" y="360" fill="#bbf7d0" font-size="20" font-family="Segoe UI, Arial">contract-gated</text>
  <text x="700" y="360" fill="#fecaca" font-size="20" font-family="Segoe UI, Arial">haeufig implizit</text>
  <text x="930" y="360" fill="#fde68a" font-size="20" font-family="Segoe UI, Arial">framework-abhaengig</text>

  <text x="110" y="420" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial">Reproduzierbarkeit</text>
  <text x="430" y="420" fill="#bbf7d0" font-size="20" font-family="Segoe UI, Arial">Replay + Gates</text>
  <text x="700" y="420" fill="#fecaca" font-size="20" font-family="Segoe UI, Arial">best effort</text>
  <text x="930" y="420" fill="#fde68a" font-size="20" font-family="Segoe UI, Arial">uneinheitlich</text>

  <text x="110" y="480" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial">Lokaler Betrieb</text>
  <text x="430" y="480" fill="#bbf7d0" font-size="20" font-family="Segoe UI, Arial">explizit vorgesehen</text>
  <text x="700" y="480" fill="#fecaca" font-size="20" font-family="Segoe UI, Arial">oft cloud-zentriert</text>
  <text x="930" y="480" fill="#fde68a" font-size="20" font-family="Segoe UI, Arial">gemischt</text>

  <text x="110" y="540" fill="#e2e8f0" font-size="20" font-family="Segoe UI, Arial">Release-Disziplin</text>
  <text x="430" y="540" fill="#bbf7d0" font-size="20" font-family="Segoe UI, Arial">Playbook + Gates</text>
  <text x="700" y="540" fill="#fecaca" font-size="20" font-family="Segoe UI, Arial">ad-hoc</text>
  <text x="930" y="540" fill="#fde68a" font-size="20" font-family="Segoe UI, Arial">team-abhängig</text>
</svg>
