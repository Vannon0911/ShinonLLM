name: Bug report
description: Report a reproducible bug in ShinonLLM
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, in one paragraph.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant console output or screenshots.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: validation
    attributes:
      label: Validation
      description: Optional but strongly recommended before filing.
      options:
        - label: I ran `npm run verify:backend`
          required: false
        - label: I ran `cd frontend && npm run build`
          required: false

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, browser (if frontend), and any relevant runtime settings.
      placeholder: |
        OS:
        Node:
        Browser:
        Docker (yes/no):
        Model adapter (if relevant):
    validations:
      required: false

