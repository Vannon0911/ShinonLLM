<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" role="img" aria-labelledby="t d">
  <title id="t">ShinonLLM Konzeptvisualisierung</title>
  <desc id="d">Eine abstrakte Grafik aus Flusslinien und Knoten fuer Planung, Stabilitaet und Ausfuehrung.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9efe2"/>
      <stop offset="100%" stop-color="#e9dcc8"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f5f56"/>
      <stop offset="100%" stop-color="#b33a1b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1280" height="820" fill="url(#bg)"/>

  <g opacity="0.16" stroke="#3f352d" stroke-width="2" fill="none">
    <path d="M20 220 C220 150, 420 300, 640 240 S1040 170, 1260 280"/>
    <path d="M20 330 C240 420, 440 260, 640 360 S1040 460, 1260 350"/>
    <path d="M20 500 C260 430, 420 620, 640 540 S1040 470, 1260 590"/>
  </g>

  <g stroke="url(#ink)" stroke-width="6" fill="none">
    <path d="M90 180 C290 110, 420 320, 610 240 C780 170, 920 130, 1140 210"/>
    <path d="M120 430 C300 350, 420 540, 600 460 C760 390, 910 340, 1120 410"/>
    <path d="M160 650 C340 570, 450 760, 630 670 C810 580, 930 540, 1110 600"/>
  </g>

  <g fill="#1f1b17">
    <circle cx="210" cy="160" r="14"/>
    <circle cx="615" cy="240" r="13"/>
    <circle cx="1120" cy="205" r="15"/>
    <circle cx="150" cy="430" r="12"/>
    <circle cx="605" cy="460" r="13"/>
    <circle cx="1100" cy="405" r="14"/>
    <circle cx="180" cy="650" r="12"/>
    <circle cx="635" cy="670" r="13"/>
    <circle cx="1090" cy="600" r="14"/>
  </g>

  <g filter="url(#soft)" opacity="0.18">
    <ellipse cx="320" cy="220" rx="240" ry="90" fill="#b33a1b"/>
    <ellipse cx="930" cy="500" rx="280" ry="110" fill="#1f5f56"/>
  </g>

  <g font-family="'IBM Plex Mono', 'Courier New', monospace" fill="#3d3129">
    <text x="76" y="98" font-size="28">SHINONLLM</text>
    <text x="76" y="132" font-size="20">Planbar. Nachvollziehbar. Lokal.</text>
  </g>
</svg>
